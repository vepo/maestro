apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: streamapplications.maestro.dev
spec:
  group: maestro.dev
  names:
    kind: StreamApplication
    plural: streamapplications
    singular: streamapplication
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                pipeline:
                  type: string
                kafka:
                  type: object
                  properties:
                    bootstrapServers:
                      type: string
                    applicationId:
                      type: string
                    defaultKeySerde:
                      type: string
                    defaultValueSerde:
                      type: string
                    properties:
                      type: object
                      additionalProperties:
                        type: string
                image:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
