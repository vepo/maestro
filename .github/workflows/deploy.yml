name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      version:
        description: Image tag to deploy
        required: true
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
      - name: Apply CRD
        run: kubectl apply -f maestro-crd/src/main/resources/crd/streamapplication-crd.yaml
      - name: Deploy operator
        run: kubectl apply -k deploy/operator/overlays/${{ inputs.environment }}
