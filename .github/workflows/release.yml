name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - run: mvn -B verify
      - run: mvn -B -pl maestro-app package -DskipTests
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: maestro-docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/maestro-app:${{ github.ref_name }}
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            maestro-crd/src/main/resources/crd/streamapplication-crd.yaml
            maestro-app/target/maestro-app-*.jar
