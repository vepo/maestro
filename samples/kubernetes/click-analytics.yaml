apiVersion: maestro.dev/v1alpha1
kind: StreamApplication
metadata:
  name: click-analytics
  namespace: default
spec:
  pipeline: |
    FROM clickstream
    |> FILTER WHERE event_type = 'page_view'
    |> WINDOW TUMBLING SIZE 5 MINUTES
    |> GROUP BY user_id, page_url
    |> AGGREGATE count(*) AS view_count, avg(time_on_page) AS avg_time
    |> TO analytics_topic
  kafka:
    bootstrapServers: kafka:9092
    applicationId: click-analytics
  image: maestro-app:local
