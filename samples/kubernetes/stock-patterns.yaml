apiVersion: maestro.dev/v1alpha1
kind: StreamApplication
metadata:
  name: stock-patterns
  namespace: default
spec:
  pipeline: |
    FROM stock_ticks
    |> PATTERN
       DROP = price < stop_loss,
       REBOUND = price > take_profit WITHIN 5 MINUTES AFTER DROP
    |> DETECT AS volatility_event
    |> TO alerts
  kafka:
    bootstrapServers: kafka:9092
    applicationId: stock-patterns
  image: maestro-app:local
