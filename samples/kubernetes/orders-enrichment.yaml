apiVersion: maestro.dev/v1alpha1
kind: StreamApplication
metadata:
  name: orders-enrichment
  namespace: default
spec:
  pipeline: |
    FROM orders
    |> JOIN users ON orders.user_id = users.id LOOKUP TABLE 'users'
    |> JOIN products ON orders.product_id = products.id STREAM 'product_updates'
    |> PROJECT enriched_order: order_id, user_name, product_name, quantity, price
    |> TO enriched_orders
  kafka:
    bootstrapServers: kafka:9092
    applicationId: orders-enrichment
  image: maestro-app:local
